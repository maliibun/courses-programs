<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Panel Project</title>
    <link rel="stylesheet" href="./style_reset.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="pricing-panel">
        <div class="pricing-choice">
            <img src="./icons/icon1.png" alt="img-personal" class="pricing-img">
            <h2 class="pricing-header">Personal</h2>
            <ul class="pricing-features">
                <li class="pricing-item">Custom domains</li>
                <li class="pricing-item">Sleeps after 3 mins of inctivity</li>
            </ul>
            <span class="pricing-cost">Free</span>
            <a href="/#" class="pricing-button">Sign up</a>
        </div>

        <div class="pricing-choice">
            <img src="./icons/icon2.png" alt="img-smallteam" class="pricing-img">
            <h2 class="pricing-header">Small team</h2>
            <ul class="pricing-features">
                <li class="pricing-item">No sleep</li>
                <li class="pricing-item">Multiple workers for powerful apps</li>
            </ul>
            <span class="pricing-cost">$150</span>
            <a href="/#" class="pricing-button featured">Free trial</a>
            <span class="featured-tag">Featured!</span>
        </div>

        <div class="pricing-choice">
            <img src="./icons/icon3.png" alt="img-business" class="pricing-img">
            <h2 class="pricing-header">Enterprise</h2>
            <ul class="pricing-features">
                <li class="pricing-item">For your business</li>
                <li class="pricing-item">Dedicated workers who dont sleep or eat</li>
            </ul>
            <span class="pricing-cost">$400</span>
            <a href="/#" class="pricing-button">Free trial</a>
        </div>
    </div>
</body>
</html>
